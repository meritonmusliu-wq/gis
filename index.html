<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS - Centro Fresaggio</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="GIS Centro Fresaggio">
            </a>
            <div class="header-right">
                <a href="#contatti" class="store-btn">STORE GIS</a>
                <button class="hamburger" id="hamburger" aria-label="Menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <nav class="nav" id="nav">
        <ul class="nav-list">
            <li><a href="#home" class="nav-link active">Home</a></li>
            <li><a href="#servizi" class="nav-link">I nostri servizi</a></li>

            <li><a href="#contatti" class="nav-link">Contatti</a></li>

    <!-- Cookie Banner -->
    <div class="cookie-banner" id="cookieBanner">

            <div class="cookie-icon">&#x1f36a;</div>
            <div class="cookie-text">
                <h3>Utilizziamo i cookie</h3>
                <p>Questo sito utilizza cookie per migliorare la tua esperienza di navigazione e per analizzare il traffico del sito. Puoi accettare tutti i cookie o personalizzare le tue preferenze.</p>
                <a href="#" class="cookie-more">Ulteriori informazioni</a>
            </div>
            <div class="cookie-actions">
                <button class="cookie-btn cookie-btn-accept" id="cookieAccept">Accetta tutti</button>
                <button class="cookie-btn cookie-btn-reject" id="cookieReject">Rifiuta</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
